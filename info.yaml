# Tiny Tapeout project information
project:
  title:        "NMR-on-a-chip"      # Project title
  author:       "Thanusit Burinprakhon"      # Your name
  discord:      "thanusit"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "NMR pulse sequencer, tx, and rx with memory buffer"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_chip_top"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "chip_core.sv"
    - "chip_top.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "input_PAD[0]"
  ui[1]: "input_PAD[1]"
  ui[2]: "input_PAD[2]"
  ui[3]: "input_PAD[3]"
  ui[4]: "input_PAD[4]"
  ui[5]: "input_PAD[5]"
  ui[6]: "input_PAD[6]"
  ui[7]: "input_PAD[7]"

  # Outputs
  uo[0]: "output_PAD[0]"
  uo[1]: "output_PAD[1]"
  uo[2]: "output_PAD[2]"
  uo[3]: "output_PAD[3]"
  uo[4]: "output_PAD[4]"
  uo[5]: "output_PAD[5]"
  uo[6]: "output_PAD[6]"
  uo[7]: "output_PAD[7]"

  # Bidirectional pins
  uio[0]: "bidir_PAD[0]"
  uio[1]: "bidir_PAD[1]"
  uio[2]: "bidir_PAD[2]"
  uio[3]: "bidir_PAD[3]"
  uio[4]: "bidir_PAD[4]"
  uio[5]: "bidir_PAD[5]"
  uio[6]: "bidir_PAD[6]"
  uio[7]: "bidir_PAD[7]"

# Do not change!
yaml_version: 6
